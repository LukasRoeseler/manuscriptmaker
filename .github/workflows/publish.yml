name: Publish article (on merge)

# When a manuscript change lands on main, (re)build it and publish the final
# galleys to GitHub Pages under /articles/<id>/. The OJS native-import package
# is attached as a build artifact for the editor to upload into OJS.
on:
  push:
    branches: [main]
    paths:
      - "manuscripts/**"
      - "_extensions/**"
      - "themes/**"
      - "engine/**"
      - "docs/**"

permissions:
  contents: write

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Cache TinyTeX + Quarto
        uses: actions/cache@v4
        with:
          path: |
            ~/.TinyTeX
            ~/.local/share/quarto
          key: r2-tex-${{ runner.os }}-${{ hashFiles('_extensions/**') }}

      - uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: "1.5.53"
          tinytex: true

      - name: Install Carlito font + LaTeX packages
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-crosextra-carlito libreoffice-writer
          sudo fc-cache -f
          tlmgr install carlito tcolorbox fancyhdr tikzfill tikzpagenodes eso-pic \
            biblatex biber biblatex-apa csquotes orcidlink pifont enumitem \
            microtype xurl placeins booktabs setspace listings authblk \
            pgf etoolbox xcolor || true

      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install pyyaml jinja2

      - name: Build all changed manuscripts on main
        run: |
          chmod +x engine/scripts/build_all.sh
          base="${{ github.event.before }}"
          changed=$(git diff --name-only "$base" HEAD -- 'manuscripts/**' \
                    | awk -F/ 'NF>=3 && $2 !~ /^_/ {print $1"/"$2}' | sort -u)
          [ -z "$changed" ] && changed=$(ls -d manuscripts/*/ | sed 's#/$##' | grep -v '/_')
          mkdir -p _publish
          for d in $changed; do
            echo "::group::Publishing $d"; engine/scripts/build_all.sh "$d"
            id=$(basename "$d"); out="_publish/articles/$id"; mkdir -p "$out"
            cp "$d/article.html" "$out/index.html"
            cp "$d/article.pdf" "$out/$id.pdf" 2>/dev/null || true
            cp "$d/article.xml" "$out/$id.xml" 2>/dev/null || true
            cp "$d"/ojs/*.xml "$out/" 2>/dev/null || true
            echo "::endgroup::"
          done
          # Landing site (docs/) is copied to the gh-pages root.
          cp -r docs/* _publish/ 2>/dev/null || true

      - name: Upload OJS import packages
        uses: actions/upload-artifact@v4
        with:
          name: ojs-import-packages
          path: _publish/articles/**/*_ojs_import.xml

      - name: Deploy published articles to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: _publish
          keep_files: true
