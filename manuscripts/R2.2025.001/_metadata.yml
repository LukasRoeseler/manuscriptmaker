  running-head: "Inaugural Editorial of Replication Research (R2)"

  lay-summary: >
    Science depends on checking whether published findings hold up when
    they are repeated. Yet studies that reproduce or replicate earlier
    work are rarely published, even though they are essential for trust
    in research. Replication Research (R2) is a new, free-to-publish and
    free-to-read journal dedicated to these repeated studies across all
    fields, with open peer review and strong transparency standards.

